<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dice Roller • Aaron Juneja</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
    }

    .card {
        background: rgba(255, 255, 255, 0.9);
        width: 360px;
        padding: 30px;
        margin-top: 60px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
    }

    h2 {
        margin-top: 0;
        color: #203a43;
    }

    .scene {
        width: 180px;
        height: 180px;
        perspective: 900px;
        margin: 0 auto 20px;
    }

    .cube {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.2s cubic-bezier(.25,.8,.25,1);
    }

    .face {
        position: absolute;
        width: 180px;
        height: 180px;
        background: white;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        font-weight: bold;
        color: black;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .front  { transform: rotateY(0deg) translateZ(90px); }
    .back   { transform: rotateY(180deg) translateZ(90px); }
    .right  { transform: rotateY(90deg) translateZ(90px); }
    .left   { transform: rotateY(-90deg) translateZ(90px); }
    .top    { transform: rotateX(90deg) translateZ(90px); }
    .bottom { transform: rotateX(-90deg) translateZ(90px); }

    button {
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        font-weight: bold;
        background: #fff;
        color: #203a43;
    }

    footer {
        width: 100%;
        padding: 15px 0;
        text-align: center;
        background: rgba(0,0,0,0.2);
        color: white;
        font-size: 14px;
        margin-top: 40px;
    }

    .github-link {
        color: white;
        font-weight: bold;
        text-decoration: none;
    }

    .github-icon {
        width: 20px;
        vertical-align: middle;
        margin-left: 5px;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Dice Roller</h2>

    <div class="scene">
        <div id="cube" class="cube">
            <div class="face front">1</div>
            <div class="face back">6</div>
            <div class="face right">3</div>
            <div class="face left">4</div>
            <div class="face top">5</div>
            <div class="face bottom">2</div>
        </div>
    </div>

    <button onclick="rollDice()">Roll</button>
    <button onclick="resetDice()">Reset</button>

    <p>Result: <span id="result">-</span></p>
</div>

<footer>
    © 2025 Aaron Juneja • 
    <a class="github-link" href="https://github.com/aaronjuneja" target="_blank">
        GitHub 
        <img class="github-icon" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
    </a>
</footer>

<script>
function rollDice() {
    const cube = document.getElementById("cube");
    const final = Math.ceil(Math.random() * 6);

    const xRand = Math.floor(Math.random() * 4) * 360;
    const yRand = Math.floor(Math.random() * 4) * 360;

    let x = 0, y = 0;

    switch(final) {
        case 1: x = 0;   y = 0;   break;
        case 2: x = -90; y = 0;   break;
        case 3: x = 0;   y = -90; break;
        case 4: x = 0;   y = 90;  break;
        case 5: x = 90;  y = 0;   break;
        case 6: x = 180; y = 0;   break;
    }

    cube.style.transform = 
        `rotateX(${xRand + x}deg) rotateY(${yRand + y}deg)`;

    document.getElementById("result").textContent = final;
}

function resetDice() {
    document.getElementById("result").textContent = "-";
    document.getElementById("cube").style.transform = "rotateX(0deg) rotateY(0deg)";
}
</script>

</body>
</html>
